name: Compatibility

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: Published package version to test
        required: false
        type: string
  workflow_run:
    workflows:
      - Publish
    types:
      - completed

env:
  PACKAGE_NAME: "@miscellaneous/commitlint"

concurrency:
  group: compatibility-${{ github.event_name }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  prepare:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion
      == 'success'
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.version.outputs.value }}
      compatibility_date: ${{ steps.compatibility_date.outputs.value }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - id: version
        name: Read package version
        run: |
          manual_version="${{ github.event.inputs.package_version }}"
          if [ -n "$manual_version" ]; then
            value="$manual_version"
          else
            value=$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' deno.json | head -n 1)
          fi
          echo "value=$value" >> "$GITHUB_OUTPUT"
      - id: compatibility_date
        name: Read Cloudflare compatibility date
        run: echo "value=$(date -u +%F)" >> "$GITHUB_OUTPUT"
      - name: Write preparation summary
        run: |
          {
            echo "## Compatibility Preparation"
            echo
            echo "- Package: \`${PACKAGE_NAME}@${{ steps.version.outputs.value }}\`"
            echo "- Cloudflare Workers compatibility date: \`${{ steps.compatibility_date.outputs.value }}\`"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Ref: \`${GITHUB_REF}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deno:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version-file: .tool-versions
          cache: true
      - id: verify
        name: Verify published package in Deno
        run: |
          cat > compat-deno.ts <<EOF
          import {
            formatReport,
            lintCommit,
          } from "jsr:${PACKAGE_NAME}@${{ needs.prepare.outputs.package_version }}";

          const report = lintCommit("feat: add search");

          if (!report.valid) {
            throw new Error("The published package should accept a valid commit in Deno.");
          }

          if (!formatReport(report).includes("valid")) {
            throw new Error("The formatted Deno report should mention validity.");
          }
          EOF
          deno run compat-deno.ts
      - name: Write Deno summary
        if: always()
        run: |
          deno_version=$(sed -n 's/^deno[[:space:]]\+\(.*\)$/\1/p' .tool-versions)

          {
            echo "## Deno Compatibility"
            echo
            echo "- Package: \`${PACKAGE_NAME}@${{ needs.prepare.outputs.package_version }}\`"
            echo "- Deno: \`${deno_version}\`"
            echo "- Result: \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  node:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
      - id: verify
        name: Verify published package in Node.js
        run: |
          mkdir -p compat/node
          cd compat/node
          cat > package.json <<'EOF'
          {
            "private": true,
            "type": "module"
          }
          EOF
          npx jsr add "${PACKAGE_NAME}@${{ needs.prepare.outputs.package_version }}"
          cat > check.mjs <<'EOF'
          import { formatReport, lintCommit } from "@miscellaneous/commitlint";

          const report = lintCommit("feat: add search");

          if (!report.valid) {
            throw new Error("The published package should accept a valid commit in Node.js.");
          }

          if (!formatReport(report).includes("valid")) {
            throw new Error("The formatted Node.js report should mention validity.");
          }
          EOF
          node check.mjs
      - name: Write Node.js summary
        if: always()
        run: |
          node_version=$(sed -n 's/^nodejs[[:space:]]\+\(.*\)$/\1/p' .tool-versions)

          {
            echo "## Node.js Compatibility"
            echo
            echo "- Package: \`${PACKAGE_NAME}@${{ needs.prepare.outputs.package_version }}\`"
            echo "- Node.js: \`${node_version}\`"
            echo "- Result: \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  bun:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions
      - id: verify
        name: Verify published package in Bun
        run: |
          mkdir -p compat/bun
          cd compat/bun
          cat > package.json <<'EOF'
          {
            "private": true,
            "type": "module"
          }
          EOF
          bunx jsr add "${PACKAGE_NAME}@${{ needs.prepare.outputs.package_version }}"
          cat > check.ts <<'EOF'
          import { formatReport, lintCommit } from "@miscellaneous/commitlint";

          const report = lintCommit("feat: add search");

          if (!report.valid) {
            throw new Error("The published package should accept a valid commit in Bun.");
          }

          if (!formatReport(report).includes("valid")) {
            throw new Error("The formatted Bun report should mention validity.");
          }
          EOF
          bun run check.ts
      - name: Write Bun summary
        if: always()
        run: |
          bun_version=$(sed -n 's/^bun[[:space:]]\+\(.*\)$/\1/p' .tool-versions)

          {
            echo "## Bun Compatibility"
            echo
            echo "- Package: \`${PACKAGE_NAME}@${{ needs.prepare.outputs.package_version }}\`"
            echo "- Bun: \`${bun_version}\`"
            echo "- Result: \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  workers:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
      - id: verify
        name: Verify published package in Cloudflare Workers
        run: |
          mkdir -p compat/workers/src
          cd compat/workers
          cat > package.json <<'EOF'
          {
            "private": true,
            "type": "module"
          }
          EOF
          npx jsr add "${PACKAGE_NAME}@${{ needs.prepare.outputs.package_version }}"
          npm install --no-save wrangler
          cat > wrangler.jsonc <<EOF
          {
            "name": "compat-workers",
            "main": "src/index.ts",
            "compatibility_date": "${{ needs.prepare.outputs.compatibility_date }}"
          }
          EOF
          cat > src/index.ts <<'EOF'
          import { lintCommit } from "@miscellaneous/commitlint";

          export default {
            fetch(): Response {
              const report = lintCommit("feat: add search");
              return Response.json({ valid: report.valid });
            },
          };
          EOF
          npx wrangler dev --config wrangler.jsonc --ip 127.0.0.1 --port 8787 --local > wrangler.log 2>&1 &
          echo $! > wrangler.pid
          rm -f response.json
          for attempt in $(seq 1 30); do
            echo "Waiting for Wrangler to serve requests (attempt ${attempt}/30)..."
            if curl -fsS http://127.0.0.1:8787 > response.json; then
              break
            fi

            if ! kill -0 "$(cat wrangler.pid)" 2>/dev/null; then
              echo "Wrangler exited before becoming ready."
              cat wrangler.log
              exit 1
            fi

            sleep 2
          done

          if [ ! -f response.json ]; then
            echo "Wrangler never became ready."
            cat wrangler.log
            exit 1
          fi

          node --input-type=module -e 'import { readFileSync } from "node:fs"; const response = JSON.parse(readFileSync("response.json", "utf8")); if (!response.valid) throw new Error("The published package should accept a valid commit in Cloudflare Workers.");'
      - name: Stop Wrangler
        if: always()
        run: |
          if [ -f compat/workers/wrangler.pid ]; then
            kill "$(cat compat/workers/wrangler.pid)" || true
          fi
      - name: Write Cloudflare Workers summary
        if: always()
        run: |
          node_version=$(sed -n 's/^nodejs[[:space:]]\+\(.*\)$/\1/p' .tool-versions)

          {
            echo "## Cloudflare Workers Compatibility"
            echo
            echo "- Package: \`${PACKAGE_NAME}@${{ needs.prepare.outputs.package_version }}\`"
            echo "- Node.js: \`${node_version}\`"
            echo "- Compatibility date: \`${{ needs.prepare.outputs.compatibility_date }}\`"
            echo "- Result: \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  browsers:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
      - id: verify
        name: Verify published package in browsers
        run: |
          mkdir -p compat/browser
          cd compat/browser
          cat > package.json <<'EOF'
          {
            "private": true,
            "type": "module"
          }
          EOF
          npx jsr add "${PACKAGE_NAME}@${{ needs.prepare.outputs.package_version }}"
          npm install --no-save @playwright/test vite
          npx playwright install --with-deps chromium firefox webkit
          cat > index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Compatibility Browser Fixture</title>
            </head>
            <body>
              <main id="result">pending</main>
              <script type="module" src="./main.js"></script>
            </body>
          </html>
          EOF
          cat > main.js <<'EOF'
          import { lintCommit } from "@miscellaneous/commitlint";

          const report = lintCommit("feat: add search");
          const result = document.querySelector("#result");

          if (result) {
            result.textContent = report.valid ? "valid" : "invalid";
          }
          EOF
          cat > playwright.config.mjs <<'EOF'
          import { defineConfig } from "@playwright/test";

          export default defineConfig({
            testDir: ".",
            testMatch: "compat.spec.mjs",
            use: {
              baseURL: "http://127.0.0.1:4173",
            },
            webServer: {
              command: "npx vite --host 127.0.0.1 --port 4173 --strictPort",
              url: "http://127.0.0.1:4173",
              reuseExistingServer: false,
            },
            projects: [
              {
                name: "chromium",
                use: { browserName: "chromium" },
              },
              {
                name: "firefox",
                use: { browserName: "firefox" },
              },
              {
                name: "webkit",
                use: { browserName: "webkit" },
              },
            ],
          });
          EOF
          cat > compat.spec.mjs <<'EOF'
          import { expect, test } from "@playwright/test";

          test("the published package works in the browser bundle", async ({ page }) => {
            await page.goto("http://127.0.0.1:4173/");
            await expect(page.locator("#result")).toHaveText("valid");
          });
          EOF
          npx playwright test
      - name: Write browser summary
        if: always()
        run: |
          node_version=$(sed -n 's/^nodejs[[:space:]]\+\(.*\)$/\1/p' .tool-versions)

          {
            echo "## Browser Compatibility"
            echo
            echo "- Package: \`${PACKAGE_NAME}@${{ needs.prepare.outputs.package_version }}\`"
            echo "- Node.js: \`${node_version}\`"
            echo "- Browsers: \`chromium\`, \`firefox\`, \`webkit\`"
            echo "- Result: \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  summary:
    if: always()
    needs:
      - prepare
      - deno
      - node
      - bun
      - workers
      - browsers
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Write compatibility summary
        run: |
          deno_version=$(sed -n 's/^deno[[:space:]]\+\(.*\)$/\1/p' .tool-versions)
          node_version=$(sed -n 's/^nodejs[[:space:]]\+\(.*\)$/\1/p' .tool-versions)
          bun_version=$(sed -n 's/^bun[[:space:]]\+\(.*\)$/\1/p' .tool-versions)

          {
            echo "## Compatibility Summary"
            echo
            echo "- Package: \`${PACKAGE_NAME}@${{ needs.prepare.outputs.package_version }}\`"
            echo "- Deno: \`${deno_version}\`"
            echo "- Node.js: \`${node_version}\`"
            echo "- Bun: \`${bun_version}\`"
            echo "- Cloudflare Workers compatibility date: \`${{ needs.prepare.outputs.compatibility_date }}\`"
            echo
            echo "| Target | Result |"
            echo "| --- | --- |"
            echo "| Deno | \`${{ needs.deno.result }}\` |"
            echo "| Node.js | \`${{ needs.node.result }}\` |"
            echo "| Bun | \`${{ needs.bun.result }}\` |"
            echo "| Cloudflare Workers | \`${{ needs.workers.result }}\` |"
            echo "| Browsers | \`${{ needs.browsers.result }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
