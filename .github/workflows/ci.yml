name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version-file: .tool-versions
      - id: check
        name: Run checks
        run: deno task check
      - name: Write CI summary
        if: always()
        run: |
          deno_version=$(sed -n 's/^deno[[:space:]]\+\(.*\)$/\1/p' .tool-versions)

          {
            echo "## CI Summary"
            echo
            echo "- Ref: \`${GITHUB_REF}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Deno: \`${deno_version}\`"
            echo "- Command: \`deno task check\`"
            echo "- Result: \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
