name: Publish

on:
  push:
    branches:
      - master
    paths:
      - deno.json
      - .github/workflows/publish.yml
  workflow_dispatch:

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      current_version: ${{ steps.compare.outputs.current_version }}
      previous_version: ${{ steps.compare.outputs.previous_version }}
      version_changed: ${{ steps.compare.outputs.version_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: compare
        name: Check whether package version changed
        shell: bash
        run: |
          current_version=$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' deno.json | head -n 1)

          if [ -z "$current_version" ]; then
            echo "Unable to determine the current package version from deno.json" >&2
            exit 1
          fi

          previous_version=""
          version_changed="true"

          if [ "${{ github.event_name }}" = "push" ]; then
            before_sha='${{ github.event.before }}'

            if [ -n "$before_sha" ] &&
              [ "$before_sha" != "0000000000000000000000000000000000000000" ]; then
              previous_version=$(git show "${before_sha}:deno.json" 2>/dev/null |
                sed -n 's/.*"version": "\([^"]*\)".*/\1/p' | head -n 1)

              if [ "$previous_version" = "$current_version" ]; then
                version_changed="false"
              fi
            fi
          fi

          {
            echo "current_version=$current_version"
            echo "previous_version=$previous_version"
            echo "version_changed=$version_changed"
          } >> "$GITHUB_OUTPUT"
      - name: Write gate summary
        if: always()
        run: |
          {
            echo "## Publish Gate"
            echo
            echo "- Event: \`${{ github.event_name }}\`"
            echo "- Current version: \`${{ steps.compare.outputs.current_version }}\`"
            echo "- Previous version: \`${{ steps.compare.outputs.previous_version || 'n/a' }}\`"
            echo "- Version changed: \`${{ steps.compare.outputs.version_changed }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    needs: version-gate
    if: needs.version-gate.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version-file: .tool-versions
      - id: publish
        name: Publish package to JSR
        run: deno publish
      - id: bundle
        name: Create source bundle for attestation
        run: |
          mkdir -p dist
          git archive \
            --format=tar.gz \
            --output=dist/jsr-source.tar.gz \
            HEAD \
            LICENSE.md \
            README.md \
            deno.json \
            mod.ts \
            src
      - id: attest
        name: Generate GitHub build provenance attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/jsr-source.tar.gz
      - name: Write publish summary
        if: always()
        run: |
          deno_version=$(sed -n 's/^deno[[:space:]]\+\(.*\)$/\1/p' .tool-versions)
          package_name=$(sed -n 's/.*"name": "\([^"]*\)".*/\1/p' deno.json | head -n 1)
          package_version='${{ needs.version-gate.outputs.current_version }}'
          previous_version='${{ needs.version-gate.outputs.previous_version }}'

          {
            echo "## Publish Summary"
            echo
            echo "- Package: \`${package_name}@${package_version}\`"
            echo "- Previous version: \`${previous_version:-n/a}\`"
            echo "- Ref: \`${GITHUB_REF}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Deno: \`${deno_version}\`"
            echo "- Publish step: \`${{ steps.publish.outcome }}\`"
            echo "- Source bundle step: \`${{ steps.bundle.outcome }}\`"
            echo "- GitHub attestation step: \`${{ steps.attest.outcome }}\`"
            echo "- Source bundle: \`dist/jsr-source.tar.gz\`"
            echo "- Job result: \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
